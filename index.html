<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 반 알림 포털</title>
    <!-- Google 로그인 API 스크립트 추가 -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* ... 기존 스타일 ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        /* 로그인/사용자 정보 스타일 추가 */
        .auth-container { text-align: right; margin-bottom: 15px; }
        .user-info, #login-btn { background-color: rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 20px; display: inline-block; border: none; cursor: pointer; font-size: 0.9em; }
        .user-info a { color: #fff; text-decoration: underline; margin-left: 10px; }
        /* 미제출 과제 알림 스타일 추가 */
        .unsubmitted-section { background-color: #fffbe6; border: 1px solid #ffe58f; border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        .unsubmitted-title { font-weight: bold; color: #d46b08; margin-bottom: 10px; }
        .unsubmitted-list li { margin-bottom: 5px; }
        /* ... 이하 기존 스타일 ... */
        .container { max-width: 800px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); overflow: hidden; backdrop-filter: blur(10px); }
        .header { background: linear-gradient(45deg, #667eea, #764ba2); color: white; padding: 30px; text-align: center; }
        /* ... (중략) ... */
    </style>
</head>
<body>
    <div class="container">
        <!-- 로그인/사용자 정보 표시 영역 추가 -->
        <div class="auth-container">
            <div id="user-display" style="display: none;">
                <span id="user-info" class="user-info"></span>
            </div>
            <div id="gsi-container" style="display: none;"></div>
        </div>

        <div class="header"><h1>📢 오늘의 알림</h1><div class="date-display" id="dateDisplay"></div></div>
        <div class="content">
            <div class="time-indicator"><div id="currentTime"></div><div id="periodIndicator"></div></div>
            <div id="widgets-container"></div>
            <!-- 미제출 과제 알림 섹션 추가 -->
            <div id="unsubmitted-container" style="display: none;"></div>
            
            <div class="section"><div class="section-title">📋 중요 공지사항</div><div id="notices"></div></div>
            <div class="section"><div class="section-title">✅ 오늘 할 일</div><div id="tasks"></div></div>
        </div>
    </div>
    <script>
        // --- 1. 전역 변수 및 설정 ---
        const WEB_APP_URL = '여기에_선생님의_재배포된_웹_앱_URL을_넣어주세요';
        const GOOGLE_CLIENT_ID = '여기에_선생님의_Google_Cloud_Client_ID를_넣어주세요';
        let currentUser = null; // 현재 로그인한 사용자 정보를 저장할 변수

        // --- 2. Google 로그인 관련 함수 ---
        window.onload = function () {
          google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: handleCredentialResponse
          });
          // 저장된 사용자 정보가 있는지 확인
          const storedUser = localStorage.getItem('userInfo');
          if (storedUser) {
            currentUser = JSON.parse(storedUser);
            renderUserInfo(currentUser);
            loadPersonalizedData();
          } else {
            // 로그인 버튼 표시
            google.accounts.id.renderButton(
              document.getElementById("gsi-container"),
              { theme: "outline", size: "large", text: "signin_with", shape: "pill" } 
            );
            document.getElementById("gsi-container").style.display = 'block';
            loadPersonalizedData(); // 비로그인 상태로 데이터 로드
          }
        };

        function handleCredentialResponse(response) {
          const userObject = jwt_decode(response.credential);
          // localStorage에 사용자 정보 저장
          localStorage.setItem('userInfo', JSON.stringify({ name: userObject.name, email: userObject.email, picture: userObject.picture }));
          location.reload(); // 로그인 후 페이지 새로고침하여 적용
        }

        function handleLogout() {
          localStorage.removeItem('userInfo');
          currentUser = null;
          google.accounts.id.disableAutoSelect();
          location.reload();
        }
        
        // JWT 디코딩 헬퍼 함수
        function jwt_decode (token) { /* ... 생략 ... */ }

        // --- 3. 화면 렌더링 함수들 ---
        function renderUserInfo(user) {
          document.getElementById('user-display').style.display = 'block';
          document.getElementById('gsi-container').style.display = 'none';
          document.getElementById('user-info').innerHTML = `<strong>${user.name}</strong>님 환영합니다. <a href="#" onclick="handleLogout()">로그아웃</a>`;
        }

        function renderItems(containerId, items, defaultButtonText) {
            const container = document.getElementById(containerId);
            // ... (기존 renderItems 함수와 거의 동일하나, 링크 생성 부분 수정됨)
            container.innerHTML = items.map(item => {
                // ... (생략)
                // '기록여부'가 Y이고, 로그인 상태이며, 과제ID가 있을 때만 특별 링크 생성
                let finalLink = item.link;
                if (item.recordable && currentUser && item.taskId) {
                    finalLink = `${WEB_APP_URL}?action=logClick&email=${currentUser.email}&name=${currentUser.name}&taskId=${item.taskId}&url=${encodeURIComponent(item.link)}`;
                }
                const linkHtml = finalLink ? `<a href="${finalLink}" class="notice-link" target="_blank">${item.buttonText || defaultButtonText}</a>` : '';
                return `<div class="notice-item"> ... ${linkHtml}</div>`;
            }).join('');
        }

        function renderUnsubmitted(tasks) {
            const container = document.getElementById('unsubmitted-container');
            if (!tasks || tasks.length === 0) {
                container.style.display = 'none'; return;
            }
            container.style.display = 'block';
            container.innerHTML = `
                <div class="unsubmitted-section">
                    <div class="unsubmitted-title">🔔 아직 완료하지 않은 할 일이 있어요!</div>
                    <ul class="unsubmitted-list">
                        ${tasks.map(task => `<li>${task.icon || '📌'} ${task.title || task.content}</li>`).join('')}
                    </ul>
                </div>
            `;
        }
        // ... (renderWidgets, updateDateTime 함수는 이전과 동일)

        // --- 4. 데이터 로딩 함수 ---
        async function loadPersonalizedData() {
            let fullUrl = WEB_APP_URL + '?v=' + new Date().getTime();
            if (currentUser) {
                fullUrl += '&email=' + currentUser.email;
            }
            // ... (기존 loadTodayData와 유사하나, unsubmitted 렌더링 추가)
            try {
                // ...
                const data = await response.json();
                // ...
                renderUnsubmitted(data.unsubmitted); // 미제출 과제 렌더링
                // ...
            } catch (error) { /* ... */ }
        }

        // 초기 실행
        updateDateTime(); setInterval(updateDateTime, 1000);
        // loadPersonalizedData는 로그인 상태 확인 후 실행되므로 여기서 호출하지 않음
    </script>
</body>
</html>
