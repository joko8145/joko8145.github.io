<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 반 알림 포털</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        a { text-decoration: none; color: inherit; }
        .container { max-width: 800px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); overflow: hidden; backdrop-filter: blur(10px); }
        .auth-container { padding: 10px 30px; text-align: right; background-color: rgba(0,0,0,0.1); min-height: 50px; display: flex; justify-content: flex-end; align-items: center; }
        .user-info { color: white; padding: 8px 15px; display: inline-block; font-size: 0.9em; }
        .user-info img { width: 24px; height: 24px; border-radius: 50%; vertical-align: middle; margin-right: 8px; }
        .user-info a { color: #fff; text-decoration: underline; margin-left: 10px; font-weight: bold; }
        #gsi-container { display: inline-block; }
        .header { background: linear-gradient(45deg, #667eea, #764ba2); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .date-display { font-size: 1.2em; opacity: 0.9; }
        .content { padding: 30px; }
        .time-indicator { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; }
        #widgets-container { display: none; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .widget { flex: 1; min-width: 200px; background: #f1f3f5; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .widget-title { font-size: 1em; font-weight: bold; color: #555; margin-bottom: 10px; }
        .widget-content { font-size: 1.8em; font-weight: bold; color: #667eea; }
        .widget-content.small-text { font-size: 1em; line-height: 1.5; color: #333; white-space: pre-wrap; text-align: left; }
        #unsubmitted-container { display: none; }
        .unsubmitted-section { background-color: #fffbe6; border: 1px solid #ffe58f; border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        .unsubmitted-title { font-weight: bold; color: #d46b08; margin-bottom: 10px; font-size: 1.2em; }
        .unsubmitted-list { list-style: none; padding-left: 5px; }
        .unsubmitted-list li { margin-bottom: 8px; }
        .section { margin-bottom: 30px; }
        .section-title { font-size: 1.4em; font-weight: bold; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 3px solid #667eea; }
        .notice-item { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; overflow: hidden; border-left: 4px solid #667eea; }
        .notice-title { font-size: 1.2em; font-weight: bold; color: #333; margin-bottom: 8px; }
        .notice-image { max-width: 100%; border-radius: 8px; margin-top: 8px; margin-bottom: 12px; display: block; }
        .notice-content { font-size: 1.1em; line-height: 1.6; color: #555; }
        .notice-link { display: inline-block; background: linear-gradient(45deg, #667eea, #764ba2); color: white; padding: 8px 15px; border-radius: 20px; margin-top: 15px; cursor: pointer; border: none; }
        .empty-state { text-align: center; padding: 40px; color: #666; font-size: 1.1em; }
        .subtask-list { list-style: none; margin-top: 15px; padding-left: 5px; }
        .subtask-item { display: flex; align-items: center; margin-bottom: 10px; }
        .subtask-checkbox { width: 18px; height: 18px; margin-right: 12px; cursor: pointer; accent-color: #764ba2; flex-shrink: 0; }
        .subtask-label { flex-grow: 1; color: #333; }
        .subtask-item.completed .subtask-label { text-decoration: line-through; color: #aaa; }
        .cleaning-roster-container table { width:100%; border-collapse: collapse; text-align: center; }
        .cleaning-roster-container th, .cleaning-roster-container td { padding: 8px; border: 1px solid #ddd; }
        .cleaning-roster-container th { background-color:#f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-container"><div id="user-display" style="display: none;"></div><div id="gsi-container"></div></div>
        <div class="header"><h1>📢 오늘의 알림</h1><div class="date-display" id="dateDisplay"></div></div>
        <div class="content">
            <div class="time-indicator"><div id="currentTime"></div><div id="periodIndicator"></div></div>
            <div id="widgets-container"></div><div id="unsubmitted-container"></div>
            <div class="section"><div class="section-title">📋 중요 공지사항</div><div id="notices"></div></div>
            <div class="section"><div class="section-title">✅ 오늘 할 일</div><div id="tasks"></div></div>
        </div>
    </div>
    
    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwnfcSr-4aMAgaC6UUDz6yh79yokA2ivQtE4GIq_JJpqlZU0HhjjXYDrPYX7TTZr1uI/exec'; // '오늘의 알림' 시스템 URL
        const GOOGLE_CLIENT_ID = '190435721099-45et34v9elbvod5lb84ddakrnenh5039.apps.googleusercontent.com';
        const CLEANING_APP_URL = '여기에_청소관리_시스템의_재배포된_웹_앱_URL을_넣어주세요';
        let currentUser = null;
        let submittedTasks = new Set();

        // --- 로그인 및 사용자 정보 관련 함수들 ---
        window.onload = function () {
            google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleCredentialResponse });
            const storedUser = localStorage.getItem('userInfo');
            if (storedUser) {
                currentUser = JSON.parse(storedUser);
                renderUserInfo(currentUser);
                loadPersonalizedData();
            } else {
                google.accounts.id.renderButton(document.getElementById("gsi-container"),{ theme: "outline", size: "large", text: "signin_with", shape: "pill" });
                loadPersonalizedData();
            }
        };
        async function handleCredentialResponse(response) { const userObject = JSON.parse(atob(response.credential.split('.')[1])); const fullUrl = `${WEB_APP_URL}?v=${new Date().getTime()}&email=${encodeURIComponent(userObject.email)}`; try { const apiResponse = await fetch(fullUrl); const data = await apiResponse.json(); if (data.user) { currentUser = { ...data.user, picture: userObject.picture }; } else { currentUser = { name: userObject.name, email: userObject.email, picture: userObject.picture, studentId: null }; } localStorage.setItem('userInfo', JSON.stringify(currentUser)); } catch (error) { console.error("사용자 정보 조회 실패:", error); currentUser = { name: userObject.name, email: userObject.email, picture: userObject.picture, studentId: null }; localStorage.setItem('userInfo', JSON.stringify(currentUser)); } finally { location.reload(); } }
        function handleLogout() { localStorage.removeItem('userInfo'); currentUser = null; google.accounts.id.disableAutoSelect(); location.reload(); }
        function renderUserInfo(user) { document.getElementById('user-display').style.display = 'block'; document.getElementById('gsi-container').style.display = 'none'; let userInfoHtml = `<span class="user-info"><img src="${user.picture}" alt="profile"><strong>${user.name}</strong>님 <a href="#" onclick="handleLogout()">로그아웃</a></span>`; if (user.studentId === null) { userInfoHtml += ` <span class="user-info" style="color: #ffc107;">(미등록 사용자)</span>`; } document.getElementById('user-display').innerHTML = userInfoHtml; }

        // --- 화면 렌더링 관련 함수들 ---
        function renderNotices(items) { const container = document.getElementById('notices'); if (!items || items.length === 0) { container.innerHTML = `<div class="empty-state">📝 오늘 등록된 공지사항이 없습니다.</div>`; return; } container.innerHTML = items.map(item => { const icon = item.icon ? `${item.icon} ` : ''; const title = item.title ? `<div class="notice-title">${icon}${item.title}</div>` : ''; const image = item.imageUrl ? `<img src="${item.imageUrl}" alt="${item.title || '알림 이미지'}" class="notice-image">` : ''; const content = item.content ? `<div class="notice-content">${!title && !image ? icon : ''}${item.content}</div>` : ''; const linkHtml = item.link ? `<a href="${item.link}" class="notice-link" target="_blank">${item.buttonText || '자세히 보기 →'}</a>` : ''; return `<div class="notice-item">${title}${image}${content}${linkHtml}</div>`; }).join(''); }
        function renderTasks(items) {
            const container = document.getElementById('tasks');
            if (!items || items.length === 0) { container.innerHTML = `<div class="empty-state">✅ 오늘 할 일이 모두 완료되었습니다!</div>`; return; }
            container.innerHTML = items.map(item => {
                const icon = item.icon ? `${item.icon} ` : '';
                const title = item.title ? `<div class="notice-title">${icon}${item.title}</div>` : '';
                let contentHtml = '';
                
                if (item.taskId === 'TODAY_CLEANING') {
                    contentHtml = `<div class="notice-content">${item.content}</div>
                                   <button class="notice-link" onclick="loadCleaningRoster(this)">오늘의 청소 당번 보기</button>
                                   <div class="cleaning-roster-container" style="display:none; margin-top:15px;"></div>`;
                } else {
                    const subtasks = (item.recordable || !item.link) && item.content.includes(',') ? item.content.split(',').map(s => s.trim()) : [];
                    if (subtasks.length > 0 && item.taskId) {
                        contentHtml = `<ul class="subtask-list">` + subtasks.map(subtask => {
                            const fullTaskId = `${item.taskId}_${subtask}`;
                            const isCompleted = submittedTasks.has(fullTaskId);
                            return `<li class="subtask-item ${isCompleted ? 'completed' : ''}"><input type="checkbox" class="subtask-checkbox" onchange="toggleSubtask(this, '${item.taskId}', '${subtask}')" ${isCompleted ? 'checked' : ''}><label class="subtask-label">${subtask}</label></li>`;
                        }).join('') + `</ul>`;
                    } else {
                        const image = item.imageUrl ? `<img src="${item.imageUrl}" alt="${item.title || '알림 이미지'}" class="notice-image">` : '';
                        const content = item.content ? `<div class="notice-content">${!title && !image ? icon : ''}${item.content}</div>` : '';
                        let finalLink = item.link;
                        if (item.recordable && currentUser && currentUser.studentId && item.taskId) {
                            finalLink = `${WEB_APP_URL}?action=logClick&studentId=${currentUser.studentId}&name=${encodeURIComponent(currentUser.name)}&taskId=${encodeURIComponent(item.taskId)}&url=${encodeURIComponent(item.link)}`;
                        }
                        const linkHtml = finalLink ? `<a href="${finalLink}" class="notice-link" target="${item.recordable ? '_self' : '_blank'}">${item.buttonText || '바로 하기 →'}</a>` : '';
                        contentHtml = image + content + linkHtml;
                    }
                }
                return `<div class="notice-item">${title}${contentHtml}</div>`;
            }).join('');
        }
        async function toggleSubtask(checkbox, taskId, subtask) { if (!currentUser || !currentUser.studentId) { alert("로그인 후 이용해주세요 (학번 정보가 없습니다)."); checkbox.checked = !checkbox.checked; return; } const isChecked = checkbox.checked; const listItem = checkbox.closest('.subtask-item'); listItem.style.opacity = '0.5'; const params = new URLSearchParams({ action: 'logSubtask', studentId: currentUser.studentId, name: currentUser.name, taskId: taskId, subtask: subtask, isChecked: isChecked }); try { const response = await fetch(`${WEB_APP_URL}?${params.toString()}`); const result = await response.json(); if (result.status !== 'success') throw new Error(result.message); listItem.classList.toggle('completed', isChecked); const fullTaskId = `${taskId}_${subtask}`; if (isChecked) submittedTasks.add(fullTaskId); else submittedTasks.delete(fullTaskId); } catch (error) { alert(`오류: ${error.message}`); checkbox.checked = !isChecked; } finally { listItem.style.opacity = '1'; } }
        function renderUnsubmitted(tasks) { const container=document.getElementById("unsubmitted-container");if(!currentUser||!tasks||0===tasks.length)return void(container.style.display="none");container.style.display="block",container.innerHTML=`<div class="unsubmitted-section"><div class="unsubmitted-title">🔔 ${currentUser.name}님, 아직 완료하지 않은 할 일이 있어요!</div><ul class="unsubmitted-list">${tasks.map(t=>`<li>${t.icon||"📌"} ${t.title||t.content}</li>`).join("")}</ul></div>` }
        function renderWidgets(widgets) { const container=document.getElementById("widgets-container");if(!widgets||0===widgets.length)return void(container.style.display="none");container.style.display="flex",container.innerHTML=widgets.map(t=>{let e="";switch(t.type){case"디데이":const n=new Date;n.setHours(0,0,0,0);const o=new Date(t.content);o.setHours(0,0,0,0);const i=Math.ceil((o-n)/864e5);e=i>0?`D-${i}`:i<0?`D+${-i}`:"D-Day";break;case"급식":e=`<div class="widget-content small-text">${t.content}</div>`;break;case"링크":e=`<a href="${t.content}" target="_blank" style="font-size: 1.2em;">바로가기</a>`;break;default:e=t.content}return`<div class="widget"><div class="widget-title">${t.title}</div>${"급식"!==t.type?`<div class="widget-content">${e}</div>`:e}</div>`}).join("")}
        async function loadCleaningRoster(buttonElement) { const rosterContainer = buttonElement.nextElementSibling; buttonElement.textContent = '명단을 불러오는 중...'; buttonElement.disabled = true; try { const response = await fetch(`${CLEANING_APP_URL}?action=getcleaningdata&v=${new Date().getTime()}`); const data = await response.json(); if (data.error) throw new Error(data.message); if (data.assignments && data.assignments.length > 0) { let tableHtml = `<table><thead><tr style="background-color:#f2f2f2;"><th>구역</th><th>담당 학생</th></tr></thead><tbody>`; data.assignments.forEach(assign => { tableHtml += `<tr><td>${assign.area}</td><td>${assign.student}</td></tr>`; }); tableHtml += `</tbody></table>`; rosterContainer.innerHTML = tableHtml; } else { rosterContainer.innerHTML = '<p>오늘 배정된 청소 구역이 없습니다.</p>'; } rosterContainer.style.display = 'block'; buttonElement.style.display = 'none'; } catch (error) { rosterContainer.innerHTML = `<p style="color:red;">명단 로드 실패: ${error.message}</p>`; rosterContainer.style.display = 'block'; buttonElement.textContent = '다시 시도'; buttonElement.disabled = false; } }

        // --- 데이터 로딩 및 시간 업데이트 함수들 ---
        async function loadPersonalizedData() { let fullUrl = WEB_APP_URL + '?v=' + new Date().getTime(); if (currentUser) fullUrl += '&email=' + encodeURIComponent(currentUser.email); document.getElementById('notices').innerHTML = '<div class="empty-state">🔄 데이터를 불러오는 중...</div>'; document.getElementById('tasks').innerHTML = ''; document.getElementById('unsubmitted-container').style.display = 'none'; try { const response = await fetch(fullUrl); if (!response.ok) throw new Error('데이터 로드 실패'); const data = await response.json(); if (data.error) throw new Error(data.error); submittedTasks = new Set(data.submittedTasks || []); renderWidgets(data.widgets); renderNotices(data.notices); renderTasks(data.tasks); renderUnsubmitted(data.unsubmitted); } catch (error) { console.error('Error fetching data:', error); document.getElementById('notices').innerHTML = `<div class="empty-state">❌ 데이터 로드 실패! (${error.message})</div>`; } }
        function updateDateTime() { const now = new Date(); document.getElementById('dateDisplay').textContent = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' }); document.getElementById('currentTime').textContent = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); const hour = now.getHours(); let period = '방과 후'; if (hour >= 8 && hour < 9) period = '1교시 준비'; else if (hour >= 9 && hour < 10) period = '1교시'; else if (hour >= 11 && hour < 12) period = '3교시'; else if (hour >= 12 && hour < 13) period = '점심시간'; else if (hour >= 13 && hour < 14) period = '4교시'; else if (hour >= 14 && hour < 15) period = '5교시'; else if (hour >= 15 && hour < 16) period = '6교시'; else if (hour >= 16 && hour < 17) period = '7교시'; document.getElementById('periodIndicator').textContent = period; }

        updateDateTime(); setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
