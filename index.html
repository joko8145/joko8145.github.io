<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 반 알림 포털</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        a { text-decoration: none; color: inherit; }
        .container { max-width: 800px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); overflow: hidden; backdrop-filter: blur(10px); }
        .auth-container { padding: 10px 30px; text-align: right; background-color: rgba(0,0,0,0.1); }
        .user-info { color: white; padding: 8px 15px; display: inline-block; font-size: 0.9em; }
        .user-info img { width: 24px; height: 24px; border-radius: 50%; vertical-align: middle; margin-right: 8px; }
        .user-info a { color: #fff; text-decoration: underline; margin-left: 10px; font-weight: bold; }
        #gsi-container { display: inline-block; }
        .header { background: linear-gradient(45deg, #667eea, #764ba2); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .date-display { font-size: 1.2em; opacity: 0.9; }
        .content { padding: 30px; }
        .time-indicator { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; }
        #widgets-container { display: none; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .widget { flex: 1; min-width: 200px; background: #f1f3f5; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .widget-title { font-size: 1em; font-weight: bold; color: #555; margin-bottom: 10px; }
        .widget-content { font-size: 1.8em; font-weight: bold; color: #667eea; }
        .widget-content.small-text { font-size: 1em; line-height: 1.5; color: #333; white-space: pre-wrap; text-align: left; }
        #unsubmitted-container { display: none; }
        .unsubmitted-section { background-color: #fffbe6; border: 1px solid #ffe58f; border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        .unsubmitted-title { font-weight: bold; color: #d46b08; margin-bottom: 10px; font-size: 1.2em; }
        .unsubmitted-list { list-style: none; padding-left: 5px; }
        .unsubmitted-list li { margin-bottom: 8px; }
        .section { margin-bottom: 30px; }
        .section-title { font-size: 1.4em; font-weight: bold; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 3px solid #667eea; }
        .notice-item { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; overflow: hidden; border-left: 4px solid #667eea; transition: all 0.3s ease; }
        .notice-title { font-size: 1.2em; font-weight: bold; color: #333; margin-bottom: 8px; }
        .notice-image { max-width: 100%; border-radius: 8px; margin-top: 8px; margin-bottom: 12px; display: block; }
        .notice-content { font-size: 1.1em; line-height: 1.6; color: #555; }
        .notice-link { display: inline-block; background: linear-gradient(45deg, #667eea, #764ba2); color: white; padding: 8px 15px; border-radius: 20px; margin-top: 15px; }
        .empty-state { text-align: center; padding: 40px; color: #666; font-size: 1.1em; }

        /* [추가] 체크박스 관련 스타일 */
        .task-item { display: flex; align-items: flex-start; }
        .task-checkbox { width: 20px; height: 20px; margin-right: 15px; margin-top: 5px; cursor: pointer; accent-color: #764ba2; }
        .task-details { flex-grow: 1; }
        .task-item.completed .notice-content,
        .task-item.completed .notice-title { text-decoration: line-through; color: #aaa; }
        .task-item.completed { background-color: #f8f9fa; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-container"><div id="user-display" style="display: none;"></div><div id="gsi-container"></div></div>
        <div class="header"><h1>📢 오늘의 알림</h1><div class="date-display" id="dateDisplay"></div></div>
        <div class="content">
            <div class="time-indicator"><div id="currentTime"></div><div id="periodIndicator"></div></div>
            <div id="widgets-container"></div>
            <div id="unsubmitted-container"></div>
            <div class="section"><div class="section-title">📋 중요 공지사항</div><div id="notices"></div></div>
            <div class="section"><div class="section-title">✅ 오늘 할 일</div><div id="tasks"></div></div>
        </div>
    </div>
    
    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwnfcSr-4aMAgaC6UUDz6yh79yokA2ivQtE4GIq_JJpqlZU0HhjjXYDrPYX7TTZr1uI/exec';
        const GOOGLE_CLIENT_ID = '190435721099-45et34v9elbvod5lb84ddakrnenh5039.apps.googleusercontent.com';
        let currentUser = null;

        window.onload = function () {
            google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleCredentialResponse });
            const storedUser = localStorage.getItem('userInfo');
            if (storedUser) {
                currentUser = JSON.parse(storedUser);
                renderUserInfo(currentUser);
                loadPersonalizedData();
            } else {
                google.accounts.id.renderButton(document.getElementById("gsi-container"),{ theme: "outline", size: "large", text: "signin_with", shape: "pill" });
                loadPersonalizedData();
            }
        };

        function handleCredentialResponse(response) {
            const userObject = JSON.parse(atob(response.credential.split('.')[1]));
            currentUser = { name: userObject.name, email: userObject.email, picture: userObject.picture };
            localStorage.setItem('userInfo', JSON.stringify(currentUser));
            location.reload();
        }

        function handleLogout() {
            localStorage.removeItem('userInfo');
            localStorage.removeItem('completedTasks'); // [추가] 로그아웃 시 완료 기록도 삭제
            currentUser = null;
            google.accounts.id.disableAutoSelect();
            location.reload();
        }

        function renderUserInfo(user) {
            document.getElementById('user-display').style.display = 'block';
            document.getElementById('gsi-container').style.display = 'none';
            document.getElementById('user-display').innerHTML = `<span class="user-info"><img src="${user.picture}" alt="profile"><strong>${user.name}</strong>님 <a href="#" onclick="handleLogout()">로그아웃</a></span>`;
        }
        
        function renderNotices(items) { // '오늘 할 일'과 분리
            const container = document.getElementById('notices');
            if (!items || items.length === 0) {
                container.innerHTML = `<div class="empty-state">📝 오늘 등록된 공지사항이 없습니다.</div>`; return;
            }
            container.innerHTML = items.map(item => {
                const icon = item.icon ? `${item.icon} ` : '';
                const title = item.title ? `<div class="notice-title">${icon}${item.title}</div>` : '';
                const image = item.imageUrl ? `<img src="${item.imageUrl}" alt="${item.title || '알림 이미지'}" class="notice-image">` : '';
                const content = item.content ? `<div class="notice-content">${!title && !image ? icon : ''}${item.content}</div>` : '';
                const linkHtml = item.link ? `<a href="${item.link}" class="notice-link" target="_blank">${item.buttonText || '자세히 보기 →'}</a>` : '';
                return `<div class="notice-item">${title}${image}${content}${linkHtml}</div>`;
            }).join('');
        }

        // [수정] '오늘 할 일'을 위한 새로운 렌더링 함수
        function renderTasks(items) {
            const container = document.getElementById('tasks');
            const completedTasks = JSON.parse(localStorage.getItem('completedTasks')) || {};

            if (!items || items.length === 0) {
                container.innerHTML = `<div class="empty-state">✅ 오늘 할 일이 모두 완료되었습니다!</div>`; return;
            }
            container.innerHTML = items.map(item => {
                const taskId = item.taskId || item.title; // 고유 ID가 없으면 제목을 ID로 사용
                const isCompleted = completedTasks[taskId];

                const icon = item.icon ? `${item.icon} ` : '';
                const title = item.title ? `<div class="notice-title">${icon}${item.title}</div>` : '';
                const image = item.imageUrl ? `<img src="${item.imageUrl}" alt="${item.title || '알림 이미지'}" class="notice-image">` : '';
                const content = item.content ? `<div class="notice-content">${!title && !image ? icon : ''}${item.content}</div>` : '';
                
                let finalLink = item.link;
                if (item.recordable && currentUser && item.taskId) {
                    const safeName = encodeURIComponent(currentUser.name);
                    const safeTaskId = encodeURIComponent(item.taskId);
                    const safeUrl = encodeURIComponent(item.link);
                    finalLink = `${WEB_APP_URL}?action=logClick&email=${encodeURIComponent(currentUser.email)}&name=${safeName}&taskId=${safeTaskId}&url=${safeUrl}`;
                }
                const linkHtml = finalLink ? `<a href="${finalLink}" class="notice-link" target="${item.recordable ? '_self' : '_blank'}">${item.buttonText || '바로 하기 →'}</a>` : '';

                return `
                    <div class="notice-item task-item ${isCompleted ? 'completed' : ''}" id="task-${taskId}">
                        <input type="checkbox" class="task-checkbox" onchange="toggleTask('${taskId}')" ${isCompleted ? 'checked' : ''}>
                        <div class="task-details">
                            ${title}${image}${content}${linkHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // [추가] 체크박스 상태를 토글하고 저장하는 함수
        function toggleTask(taskId) {
            const completedTasks = JSON.parse(localStorage.getItem('completedTasks')) || {};
            const taskElement = document.getElementById(`task-${taskId}`);

            if (completedTasks[taskId]) {
                delete completedTasks[taskId]; // 완료 해제
                taskElement.classList.remove('completed');
            } else {
                completedTasks[taskId] = true; // 완료 처리
                taskElement.classList.add('completed');
            }
            localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
        }

        function renderUnsubmitted(tasks) { /* 이름 깨짐 문제 해결됨 */ const container=document.getElementById("unsubmitted-container");if(!currentUser||!tasks||0===tasks.length)return void(container.style.display="none");container.style.display="block",container.innerHTML=`
                <div class="unsubmitted-section">
                    <div class="unsubmitted-title">🔔 ${currentUser.name}님, 아직 완료하지 않은 할 일이 있어요!</div>
                    <ul class="unsubmitted-list">
                        ${tasks.map(t=>`<li>${t.icon||"📌"} ${t.title||t.content}</li>`).join("")}
                    </ul>
                </div>`}
        
        function renderWidgets(widgets) { /* 변경 없음 */ const container=document.getElementById("widgets-container");if(!widgets||0===widgets.length)return void(container.style.display="none");container.style.display="flex",container.innerHTML=widgets.map(t=>{let e="";switch(t.type){case"디데이":const n=new Date;n.setHours(0,0,0,0);const o=new Date(t.content);o.setHours(0,0,0,0);const i=Math.ceil((o-n)/864e5);e=i>0?`D-${i}`:i<0?`D+${-i}`:"D-Day";break;case"급식":e=`<div class="widget-content small-text">${t.content}</div>`;break;case"링크":e=`<a href="${t.content}" target="_blank" style="font-size: 1.2em;">바로가기</a>`;break;default:e=t.content}return`<div class="widget"><div class="widget-title">${t.title}</div>${"급식"!==t.type?`<div class="widget-content">${e}</div>`:e}</div>`}).join("")}

        async function loadPersonalizedData() { /* 변경 없음 */ let fullUrl = WEB_APP_URL + '?v=' + new Date().getTime(); if (currentUser) { fullUrl += '&email=' + encodeURIComponent(currentUser.email); } document.getElementById('notices').innerHTML = '<div class="empty-state">🔄 데이터를 불러오는 중...</div>'; try { const response = await fetch(fullUrl); if (!response.ok) throw new Error('데이터 로드 실패'); const data = await response.json(); if (data.error) throw new Error(data.error); if (data.user === null && currentUser) { document.getElementById('user-info').innerHTML += ` <span style="color: #ffc107;">(미등록 사용자)</span>`; } renderWidgets(data.widgets); renderNotices(data.notices); renderTasks(data.tasks); renderUnsubmitted(data.unsubmitted); } catch (error) { console.error('Error fetching data:', error); document.getElementById('notices').innerHTML = `<div class="empty-state">❌ 데이터 로드 실패! (${error.message})</div>`; } }
        
        function updateDateTime() { /* 변경 없음 */ const now=new Date;document.getElementById("dateDisplay").textContent=now.toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"}),document.getElementById("currentTime").textContent=now.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});const t=now.getHours();let e="방과 후";8<=t&&t<9?e="1교시 준비":9<=t&&t<10?e="1교시":10<=t&&t<11?e="2교시":11<=t&&t<12?e="3교시":12<=t&&t<13?e="점심시간":13<=t&&t<14?e="4교시":14<=t&&t<15?e="5교시":15<=t&&t<16?e="6교시":16<=t&&t<17&&(e="7교시"),document.getElementById("periodIndicator").textContent=e}

        updateDateTime(); setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
